name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -c "
          import sys
          from pathlib import Path
          errors = []
          for f in Path('.').rglob('*.py'):
              if '.git' in str(f):
                  continue
              try:
                  with open(f) as fp:
                      compile(fp.read(), str(f), 'exec')
              except SyntaxError as e:
                  errors.append(f'{f}:{e.lineno}: {e.msg}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              total = len(list(Path('.').rglob('*.py')))
              print(f'Syntax OK: {total} files checked')
          "

      - name: Count tools
        run: |
          echo "Total tools: $(find . -name "*.py" -not -path "./.git/*" | wc -l)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: |
          python -c "
          import subprocess, sys
          from pathlib import Path
          errors = []
          for f in sorted(Path('.').rglob('*.py')):
              if '.git' in str(f):
                  continue
              r = subprocess.run(['flake8', str(f), '--max-line-length=120', '--ignore=E501,W503'], capture_output=True, text=True)
              if r.stdout.strip():
                  errors.append(r.stdout.strip())
          if errors:
              for e in errors[:20]:
                  print(e)
          else:
              print('Lint OK')
          "
