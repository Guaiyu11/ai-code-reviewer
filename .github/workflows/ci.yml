name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" | xargs -I {} python -m py_compile {}

      - name: Count tools
        run: |
          echo "Total tools: $(find . -name "*.py" -not -path "./.git/*" | wc -l)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: |
          find . -name "*.py" -not -path "./.git/*" | xargs -I {} flake8 {} --max-line-length=120 --ignore=E501,W503 || true
